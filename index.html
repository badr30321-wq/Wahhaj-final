<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>جليس وهّاج</title>
<style>
body{
font-family: Arial;
text-align:center;
background:#f5f5f5;
margin:0;
}

.container{
background:white;
width:80%;
margin:40px auto;
padding:20px;
border-radius:15px;
}

input, button{
padding:10px;
margin:5px;
}

.card{
background:#fafafa;
padding:15px;
margin:10px;
border-radius:10px;
text-align:right;
}
</style>
</head>

<body>

<div class="container">
<h2>إضافة فائدة</h2>

<input id="name" placeholder="الاسم">
<input id="book" placeholder="الكتاب">
<input id="text" placeholder="الفائدة">

<br>

<button onclick="save()">حفظ</button>

<h2>الفوائد</h2>
<div id="data"></div>
</div>

<script>
const db = "https://wahhaj-1fcbb-default-rtdb.firebaseio.com/";

function save(){
const name = document.getElementById("name").value;
const book = document.getElementById("book").value;
const text = document.getElementById("text").value;

fetch(db + "data.json", {
method:"POST",
body: JSON.stringify({name, book, text})
});

load();
}

function load(){
fetch(db + "data.json")
.then(res => res.json())
.then(data => {
let html = "";

for(let key in data){
let item = data[key];

html += `
<div class="card">
<b>${item.name}</b><br>
${item.book}<br><br>
${item.text}
</div>
`;
}

document.getElementById("data").innerHTML = html;
});
}

setInterval(load, 3000);
load();
</script>

</body>
</html>
